<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Dog Shop" />
  <meta name="theme-color" content="#0a0a0f" />
  <link rel="manifest" href="/manifest.json" />
  <title>Dog Shop</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c27;
      --border: #2a2a3a;
      --accent: #7c6af7;
      --accent-glow: rgba(124, 106, 247, 0.25);
      --accent2: #f7a06a;
      --text: #f0f0f8;
      --text-dim: #8888aa;
      --checked: #3a3a50;
      --checked-text: #5a5a78;
      --danger: #f76a6a;
      --walmart: #0071ce;
      --walmart-hover: #0058a3;
      --success: #6af7a0;
      --radius: 16px;
      --radius-sm: 10px;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding-top: var(--safe-top);
      background: radial-gradient(ellipse 100% 45% at 50% -5%, rgba(124,106,247,0.18) 0%, transparent 65%);
    }

    /* Header */
    header {
      padding: 20px 20px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      box-shadow: 0 0 18px rgba(124,106,247,0.55);
    }

    .logo-text {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--text) 60%, var(--text-dim));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .item-count {
      font-size: 13px;
      color: var(--text-dim);
      background: var(--surface2);
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    /* Add input */
    .add-section {
      padding: 16px 20px;
      flex-shrink: 0;
    }

    .add-form {
      display: flex;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 6px 6px 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .add-form:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    #item-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 16px;
      min-height: 44px;
      caret-color: var(--accent);
    }

    #item-input::placeholder {
      color: var(--text-dim);
    }

    .add-btn {
      background: linear-gradient(135deg, var(--accent), #9a8af9);
      border: none;
      color: white;
      font-size: 22px;
      width: 44px;
      height: 44px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .add-btn:active { transform: scale(0.92); opacity: 0.85; }
    .add-form:focus-within .add-btn { box-shadow: 0 0 14px rgba(124,106,247,0.65); }
    .check-btn:active { transform: scale(0.75); }

    /* Tabs */
    .tabs {
      display: flex;
      padding: 0 20px;
      gap: 6px;
      flex-shrink: 0;
      margin-bottom: 4px;
    }

    .tab {
      flex: 1;
      padding: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .tab.active {
      background: linear-gradient(135deg, var(--accent), #9a8af9);
      border-color: var(--accent);
      color: white;
      box-shadow: 0 2px 12px var(--accent-glow);
    }

    /* List */
    .list-wrapper {
      flex: 1;
      overflow-y: auto;
      padding: 8px 20px;
      -webkit-overflow-scrolling: touch;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Item card */
    .item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 14px 14px 16px;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      animation: slideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    }

    .item:not(.checked) {
      box-shadow: inset 3px 0 0 var(--accent), 0 2px 12px rgba(0,0,0,0.25);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .item.checked {
      background: var(--checked);
      border-color: transparent;
    }

    .item.removing {
      animation: slideOut 0.25s ease forwards;
    }

    @keyframes slideOut {
      to { opacity: 0; transform: translateX(20px) scale(0.95); max-height: 0; margin: 0; padding: 0; }
    }

    .check-btn {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: none;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .item.checked .check-btn {
      background: var(--success);
      border-color: var(--success);
      color: #0a0a0f;
      font-size: 13px;
      box-shadow: 0 0 10px rgba(106,247,160,0.5);
    }

    .item-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .item-name {
      font-size: 17px;
      font-weight: 500;
      line-height: 1.3;
      transition: color 0.2s;
    }

    .name-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .qty-badge {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      background: var(--accent-glow);
      border: 1px solid rgba(124,106,247,0.3);
      border-radius: 6px;
      padding: 1px 7px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .qty-placeholder {
      font-size: 11px;
      color: var(--text-dim);
      opacity: 0.3;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .qty-input {
      width: 52px;
      background: none;
      border: none;
      border-bottom: 1px solid var(--accent);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      font-family: inherit;
      outline: none;
      padding: 1px 2px;
      text-align: center;
      flex-shrink: 0;
    }

    .item.checked .qty-badge,
    .item.checked .qty-placeholder { opacity: 0.4; pointer-events: none; }

    .item-note {
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.4;
      cursor: text;
      word-break: break-word;
    }

    .note-placeholder {
      font-size: 12px;
      color: var(--text-dim);
      opacity: 0.35;
      cursor: text;
    }

    .note-input {
      width: 100%;
      background: none;
      border: none;
      border-bottom: 1px solid var(--accent);
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      padding: 2px 0 4px;
    }

    .item.checked .item-name {
      color: var(--checked-text);
      text-decoration: line-through;
      text-decoration-color: var(--checked-text);
    }

    .item.checked .item-note,
    .item.checked .note-placeholder { display: none; }

    .item { align-items: flex-start; }
    .check-btn { margin-top: 10px; flex-shrink: 0; }
    .item-actions { margin-top: 8px; }

    .comment-trigger {
      margin-top: 4px;
      cursor: pointer;
    }

    .comment-indicator {
      font-size: 12px;
      color: var(--accent);
      font-weight: 600;
    }

    .comment-placeholder-small {
      font-size: 12px;
      color: var(--text-dim);
      opacity: 0.3;
    }

    .thread {
      display: none;
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .thread.open { display: flex; }

    .comment {
      background: var(--surface2);
      border-radius: 10px;
      padding: 8px 12px;
    }

    .comment-text {
      font-size: 14px;
      color: var(--text);
      line-height: 1.4;
      word-break: break-word;
    }

    .comment-time {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .comment-empty, .comments-loading {
      font-size: 13px;
      color: var(--text-dim);
      text-align: center;
      padding: 4px 0;
    }

    .comment-input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .comment-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      padding: 8px 14px;
      caret-color: var(--accent);
      min-height: 36px;
    }

    .comment-input:focus { border-color: var(--accent); }

    .comment-send-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #9a8af9);
      border: none;
      color: white;
      font-size: 17px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s, transform 0.1s;
      box-shadow: 0 2px 8px var(--accent-glow);
      -webkit-tap-highlight-color: transparent;
    }

    .comment-send-btn:active { opacity: 0.85; transform: scale(0.9); }

    .item-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .icon-btn {
      width: 34px;
      height: 34px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-dim);
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    .icon-btn:active { opacity: 0.65; transform: scale(0.9); }
    .icon-btn.walmart { color: var(--walmart); border-color: rgba(0,113,206,0.3); }
    .icon-btn.delete { color: var(--danger); border-color: rgba(247,106,106,0.3); }

    /* Empty state */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 12px;
      color: var(--text-dim);
    }

    .empty-icon { font-size: 48px; }
    .empty-title { font-size: 18px; font-weight: 600; color: var(--text); }
    .empty-sub { font-size: 14px; text-align: center; line-height: 1.5; }

    /* Shop all button */
    .footer {
      padding: 12px 20px;
      padding-bottom: calc(12px + var(--safe-bottom));
      flex-shrink: 0;
      display: flex;
      gap: 10px;
    }

    .shop-btn {
      flex: 1;
      background: linear-gradient(135deg, var(--walmart), #0d8ce8);
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: 0.2px;
      box-shadow: 0 4px 20px rgba(0,113,206,0.45);
    }

    .shop-btn:active { opacity: 0.85; transform: scale(0.98); }
    .shop-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .clear-btn {
      background: var(--surface);
      color: var(--text-dim);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .clear-btn:active { opacity: 0.65; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: calc(90px + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 18px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      pointer-events: none;
      opacity: 0;
      transition: all 0.3s;
      white-space: nowrap;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Sync dot */
    .sync-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      transition: background 0.3s;
    }
    .sync-dot.syncing { background: var(--accent2); animation: pulse 1s infinite; }
    .sync-dot.error { background: var(--danger); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Divider */
    .checked-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0 4px;
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .checked-divider::before, .checked-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <div class="logo-icon">🛒</div>
      <span class="logo-text">Dog Shop</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <button class="icon-btn" id="notif-btn" aria-label="Enable notifications">🔔</button>
      <div class="sync-dot" id="sync-dot"></div>
      <span class="item-count" id="item-count">0 items</span>
    </div>
  </header>

  <div class="add-section">
    <div class="add-form">
      <input
        type="text"
        id="item-input"
        placeholder="Add an item…"
        autocomplete="off"
        autocorrect="off"
        spellcheck="true"
        enterkeyhint="done"
      />
      <button class="add-btn" id="add-btn" aria-label="Add item">+</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="all">All</button>
    <button class="tab" data-tab="active">Need</button>
    <button class="tab" data-tab="checked">Got</button>
  </div>

  <div class="list-wrapper">
    <div class="list" id="list"></div>
  </div>

  <div class="footer">
    <button class="shop-btn" id="shop-btn" disabled>
      🛒 Shop All on Walmart
    </button>
    <button class="clear-btn" id="clear-btn">Clear Got</button>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API = "https://dog-shop-api.gdoggett.workers.dev";
    const VAPID_PUBLIC_KEY = "BApWWtkmLw-40xvXEpRZGdFR9De6O3I-CGyofmH6NqR46tjAPLURv9suS9xhE-ZEBXf-dWSr-IVEgu-ZfALadQw";
    let items = [];
    let activeTab = "all";
    let pollTimer = null;

    // Elements
    const listEl = document.getElementById("list");
    const inputEl = document.getElementById("item-input");
    const addBtn = document.getElementById("add-btn");
    const shopBtn = document.getElementById("shop-btn");
    const clearBtn = document.getElementById("clear-btn");
    const countEl = document.getElementById("item-count");
    const syncDot = document.getElementById("sync-dot");
    const toastEl = document.getElementById("toast");

    // Toast
    let toastTimer;
    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove("show"), 2500);
    }

    // Sync state
    function setSyncing() { syncDot.className = "sync-dot syncing"; }
    function setSynced() { syncDot.className = "sync-dot"; }
    function setSyncError() { syncDot.className = "sync-dot error"; }

    // Fetch items
    async function loadItems(silent = false) {
      if (silent && (document.querySelector(".note-input") || document.querySelector(".thread.open"))) return;
      if (!silent) setSyncing();
      try {
        const res = await fetch(`${API}/api/items`);
        if (!res.ok) throw new Error();
        const data = await res.json();
        items = data;
        render();
        setSynced();
      } catch {
        setSyncError();
      }
    }

    // Render list
    function render() {
      const unchecked = items.filter(i => !i.checked);
      const checked   = items.filter(i => i.checked);

      let visible = [];
      if (activeTab === "all")     visible = [...unchecked, ...checked];
      if (activeTab === "active")  visible = unchecked;
      if (activeTab === "checked") visible = checked;

      // Update count
      const total = unchecked.length;
      countEl.textContent = total === 0 ? "all clear" : `${total} need${total === 1 ? "s" : ""}`;

      // Shop button
      shopBtn.disabled = unchecked.length === 0;

      // Render
      listEl.innerHTML = "";

      if (visible.length === 0) {
        const msg = activeTab === "checked"
          ? ["✓", "Nothing checked off yet", "Tap the circle on an item when it's in the cart."]
          : ["🛒", "List is empty", "Add your first item above and everyone will see it."];
        listEl.innerHTML = `
          <div class="empty">
            <div class="empty-icon">${msg[0]}</div>
            <div class="empty-title">${msg[1]}</div>
            <div class="empty-sub">${msg[2]}</div>
          </div>`;
        return;
      }

      if (activeTab === "all" && unchecked.length > 0 && checked.length > 0) {
        // Show divider between unchecked and checked
        visible = unchecked;
        visible.forEach(item => listEl.appendChild(makeCard(item)));
        const div = document.createElement("div");
        div.className = "checked-divider";
        div.textContent = "In the cart";
        listEl.appendChild(div);
        checked.forEach(item => listEl.appendChild(makeCard(item)));
      } else {
        visible.forEach(item => listEl.appendChild(makeCard(item)));
      }
    }

    function makeCard(item) {
      const el = document.createElement("div");
      el.className = `item${item.checked ? " checked" : ""}`;
      el.dataset.id = item.id;

      const walmartUrl = `https://www.walmart.com/search?q=${encodeURIComponent(item.name)}`;
      const noteHtml = item.note
        ? `<span class="item-note">${escHtml(item.note)}</span>`
        : `<span class="note-placeholder">+ note</span>`;
      const qtyHtml = item.qty
        ? `<span class="qty-badge">${escHtml(item.qty)}</span>`
        : `<span class="qty-placeholder">qty</span>`;

      const count = item.comment_count || 0;
      const commentTriggerHtml = count > 0
        ? `<span class="comment-indicator">💬 ${count}</span>`
        : `<span class="comment-placeholder-small">💬</span>`;

      el.innerHTML = `
        <button class="check-btn" aria-label="Toggle checked">
          ${item.checked ? "✓" : ""}
        </button>
        <div class="item-body">
          <div class="name-row">
            <div class="qty-area">${qtyHtml}</div>
            <span class="item-name">${escHtml(item.name)}</span>
          </div>
          <div class="note-area">${noteHtml}</div>
          <div class="comment-trigger">${commentTriggerHtml}</div>
          <div class="thread"></div>
        </div>
        <div class="item-actions">
          <a class="icon-btn walmart" href="${walmartUrl}" target="_blank" rel="noopener" aria-label="Find on Walmart">🛒</a>
          <button class="icon-btn delete" aria-label="Delete item">✕</button>
        </div>`;

      el.querySelector(".check-btn").addEventListener("click", () => toggleCheck(item.id));
      el.querySelector(".delete").addEventListener("click", () => deleteItem(item.id, el));
      el.querySelector(".note-area").addEventListener("click", () => openNoteInput(item, el));
      el.querySelector(".qty-area").addEventListener("click", () => openQtyInput(item, el));
      el.querySelector(".comment-trigger").addEventListener("click", () => openThread(item, el));
      return el;
    }

    function timeAgo(dateStr) {
      const diff = Date.now() - new Date(dateStr).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return "just now";
      if (mins < 60) return `${mins}m ago`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours}h ago`;
      return `${Math.floor(hours / 24)}d ago`;
    }

    async function openThread(item, el) {
      const thread = el.querySelector(".thread");
      if (thread.classList.contains("open")) {
        thread.classList.remove("open");
        thread.innerHTML = "";
        return;
      }
      thread.classList.add("open");
      thread.innerHTML = `<div class="comments-loading">Loading…</div>`;
      try {
        const res = await fetch(`${API}/api/items/${item.id}/comments`);
        const comments = await res.json();
        renderThread(item, el, comments);
      } catch {
        thread.innerHTML = `<div class="comments-loading">Couldn't load</div>`;
      }
    }

    function renderThread(item, el, comments) {
      const thread = el.querySelector(".thread");
      const commentsHtml = comments.length
        ? comments.map(c => `
            <div class="comment">
              <div class="comment-text">${escHtml(c.text)}</div>
              <div class="comment-time">${timeAgo(c.created_at)}</div>
            </div>`).join("")
        : `<div class="comment-empty">No comments yet — ask a question</div>`;

      thread.innerHTML = `
        <div class="comments-list">${commentsHtml}</div>
        <div class="comment-input-row">
          <input class="comment-input" type="text" placeholder="Ask a question…" enterkeyhint="send" />
          <button class="comment-send-btn">↑</button>
        </div>`;

      const input = thread.querySelector(".comment-input");
      const sendBtn = thread.querySelector(".comment-send-btn");

      const send = async () => {
        const text = input.value.trim();
        if (!text) return;
        input.value = "";
        const senderEndpoint = localStorage.getItem("pushEndpoint") || null;
        try {
          const res = await fetch(`${API}/api/items/${item.id}/comments`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text, senderEndpoint }),
          });
          const comment = await res.json();
          const list = thread.querySelector(".comments-list");
          const empty = list.querySelector(".comment-empty");
          if (empty) empty.remove();
          const div = document.createElement("div");
          div.className = "comment";
          div.innerHTML = `
            <div class="comment-text">${escHtml(comment.text)}</div>
            <div class="comment-time">just now</div>`;
          list.appendChild(div);
          item.comment_count = (item.comment_count || 0) + 1;
          const trigger = el.querySelector(".comment-trigger");
          trigger.innerHTML = `<span class="comment-indicator">💬 ${item.comment_count}</span>`;
          if ("vibrate" in navigator) navigator.vibrate(15);
        } catch {
          showToast("Couldn't send");
          input.value = text;
        }
      };

      sendBtn.addEventListener("click", send);
      input.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); send(); } });
      input.focus();
    }

    function openQtyInput(item, el) {
      const area = el.querySelector(".qty-area");
      if (area.querySelector(".qty-input")) return;

      const input = document.createElement("input");
      input.type = "text";
      input.className = "qty-input";
      input.placeholder = "qty";
      input.value = item.qty || "";
      input.setAttribute("enterkeyhint", "done");
      area.innerHTML = "";
      area.appendChild(input);
      input.focus();
      input.select();

      const save = async () => {
        const qty = input.value.trim();
        item.qty = qty || null;
        area.innerHTML = qty
          ? `<span class="qty-badge">${escHtml(qty)}</span>`
          : `<span class="qty-placeholder">qty</span>`;
        try {
          await fetch(`${API}/api/items/${item.id}/qty`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ qty: qty || null }),
          });
        } catch { /* best effort */ }
      };

      input.addEventListener("blur", save);
      input.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); input.blur(); } });
    }

    function openNoteInput(item, el) {
      const area = el.querySelector(".note-area");
      if (area.querySelector(".note-input")) return;

      const input = document.createElement("input");
      input.type = "text";
      input.className = "note-input";
      input.placeholder = "Add a note…";
      input.value = item.note || "";
      input.setAttribute("enterkeyhint", "done");
      area.innerHTML = "";
      area.appendChild(input);
      input.focus();

      const save = async () => {
        const note = input.value.trim();
        item.note = note || null;
        area.innerHTML = note
          ? `<span class="item-note">${escHtml(note)}</span>`
          : `<span class="note-placeholder">+ note</span>`;
        try {
          await fetch(`${API}/api/items/${item.id}/note`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ note: note || null }),
          });
        } catch { /* best effort */ }
      };

      input.addEventListener("blur", save);
      input.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); input.blur(); } });
    }

    function escHtml(str) {
      return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    // Add item
    async function addItem() {
      const name = inputEl.value.trim();
      if (!name) return;
      inputEl.value = "";
      setSyncing();
      try {
        const senderEndpoint = localStorage.getItem("pushEndpoint") || null;
        const res = await fetch(`${API}/api/items`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, senderEndpoint }),
        });
        if (!res.ok) throw new Error();
        const item = await res.json();
        items.unshift(item);
        // Move to correct position (end of unchecked)
        items = [...items.filter(i => !i.checked), ...items.filter(i => i.checked)];
        render();
        setSynced();
        showToast(`"${name}" added`);
        if ("vibrate" in navigator) navigator.vibrate(15);
      } catch {
        setSyncError();
        showToast("Couldn't add item — check connection");
        inputEl.value = name;
      }
    }

    // Toggle check
    async function toggleCheck(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;
      item.checked = !item.checked;
      if ("vibrate" in navigator) navigator.vibrate(25);
      render();
      setSyncing();
      try {
        await fetch(`${API}/api/items/${id}/check`, { method: "PATCH" });
        setSynced();
      } catch {
        item.checked = !item.checked;
        render();
        setSyncError();
      }
    }

    // Delete item
    async function deleteItem(id, el) {
      el.classList.add("removing");
      setTimeout(async () => {
        items = items.filter(i => i.id !== id);
        render();
        setSyncing();
        try {
          await fetch(`${API}/api/items/${id}`, { method: "DELETE" });
          setSynced();
        } catch {
          setSyncError();
        }
      }, 250);
    }

    // Clear all checked
    async function clearChecked() {
      const checked = items.filter(i => i.checked);
      if (checked.length === 0) { showToast("Nothing checked off yet"); return; }
      items = items.filter(i => !i.checked);
      render();
      setSyncing();
      try {
        await Promise.all(checked.map(i =>
          fetch(`${API}/api/items/${i.id}`, { method: "DELETE" })
        ));
        setSynced();
        showToast(`Cleared ${checked.length} item${checked.length === 1 ? "" : "s"}`);
      } catch {
        setSyncError();
      }
    }

    // Shop all on Walmart
    function shopAll() {
      const unchecked = items.filter(i => !i.checked);
      if (unchecked.length === 0) return;
      const query = unchecked.map(i => i.name).join(" ");
      window.open(`https://www.walmart.com/search?q=${encodeURIComponent(query)}`, "_blank");
    }

    // Tabs
    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        activeTab = tab.dataset.tab;
        render();
      });
    });

    // Events
    addBtn.addEventListener("click", addItem);
    inputEl.addEventListener("keydown", e => { if (e.key === "Enter") addItem(); });
    shopBtn.addEventListener("click", shopAll);
    clearBtn.addEventListener("click", clearChecked);

    // Live polling — refresh every 5 seconds
    function startPolling() {
      pollTimer = setInterval(() => loadItems(true), 5000);
    }

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        clearInterval(pollTimer);
      } else {
        loadItems(true);
        startPolling();
      }
    });

    // ─── Notifications ───────────────────────────────────────────────────────
    const notifBtn = document.getElementById("notif-btn");

    function urlB64ToUint8Array(b64) {
      const pad = "=".repeat((4 - (b64.length % 4)) % 4);
      const raw = atob(b64.replace(/-/g, "+").replace(/_/g, "/") + pad);
      return Uint8Array.from(raw, c => c.charCodeAt(0));
    }

    async function subscribe() {
      try {
        const reg = await navigator.serviceWorker.ready;
        const sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlB64ToUint8Array(VAPID_PUBLIC_KEY),
        });
        const { endpoint, keys: { p256dh, auth } } = sub.toJSON();
        await fetch(`${API}/api/subscribe`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ endpoint, p256dh, auth }),
        });
        localStorage.setItem("pushEndpoint", endpoint);
        notifBtn.textContent = "🔕";
        notifBtn.title = "Notifications on";
        showToast("Notifications on");
      } catch {
        showToast("Couldn't enable notifications");
      }
    }

    function initNotifButton() {
      const stored = localStorage.getItem("pushEndpoint");
      if (stored) {
        notifBtn.textContent = "🔕";
        notifBtn.title = "Notifications on";
      }
      notifBtn.addEventListener("click", async () => {
        if (!("Notification" in window) || !("PushManager" in window)) {
          showToast("Notifications not supported on this device");
          return;
        }
        const stored = localStorage.getItem("pushEndpoint");
        if (stored) { showToast("Notifications already on"); return; }
        const perm = await Notification.requestPermission();
        if (perm !== "granted") { showToast("Notifications blocked"); return; }
        await subscribe();
      });
    }

    // Service worker
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js");
    }

    // Init
    initNotifButton();
    loadItems();
    startPolling();
  </script>
</body>
</html>
